<div class="hero-scene">
    <div class="hero-scene-content text-center text-white">  
        <h1>Connexion</h1>
    </div>
</div>

<div class="container">
    <form>
        <div class="mb-3 mt-3">
            <label for="emailInput" class="form-label">Adresse mail</label>
            <input type="email" class="form-control" id="emailInput" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">Nous ne partagerons pas votre adresse mail.</div>
        </div>
        <div class="mb-3">
            <label for="passwordInput" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="passwordInput">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label text-primary" for="exampleCheck1">Se souvenir de moi</label>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Submit</button>
            <div class="mt-2">
                <a href="/signup" class="text-primary">Vous n'avez pas de compte? Inscrivez-vous!</a>
            </div>
        </div>
    </form>
</div>
